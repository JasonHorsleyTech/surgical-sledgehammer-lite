<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Contact - Surgical Sledgehammer</title>
  <link rel="preconnect" href="https://fonts.bunny.net" />
  <link href="https://fonts.bunny.net/css?family=figtree:400,600&display=swap" rel="stylesheet" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Roboto+Mono:ital,wght@0,100..700;1,100..700&display=swap" rel="stylesheet" />
  <script type="module" src="/src/main.js"></script>
</head>
<body class="font-roboto antialiased bg-gray-100 dark:bg-black text-gray-700 dark:text-stone-400">

  <!-- Navigation -->
  <div
    class="sticky z-50 top-0 w-full bg-stone-200 dark:bg-gray-900 text-sm md:text-base"
    x-data
  >
    <div class="max-w-6xl px-4 flex flex-nowrap gap-2 mx-auto items-center" style="height: 48px;">
      <a href="/" class="h-full py-[4px]">
        <div class="hidden dark:block rounded-xl bg-cover bg-center h-full aspect-square" style="background-image: url('/images/logo-dark-small.png');"></div>
        <div class="block dark:hidden rounded-xl bg-cover bg-center h-full aspect-square" style="background-image: url('/images/logo-light-small.png');"></div>
      </a>
      <div class="grow"></div>
      <a href="/portfolio.html" class="px-2 pt-[4px] h-full grid place-content-center text-blue-700 border-b-[4px] border-transparent hover:border-blue-700 font-semibold tracking-wide">Portfolio</a>
      <a href="/contact.html" class="px-2 pt-[4px] h-full grid place-content-center text-green-800 border-b-[4px] border-green-700/25 pointer-events-none font-semibold tracking-wide">Contact</a>
    </div>
  </div>

  <!-- Contact content -->
  <div style="height: calc(100vh - 48px);">
    <div class="h-full grid place-content-center">
      <div class="font-semibold text-md md:text-lg text-center grid gap-4 border p-8 rounded-lg bg-gray-200 dark:bg-stone-900">
        <p class="flex flex-col md:flex-row flex-nowrap md:items-center justify-between text-left gap-2">
          <span class="w-[100px]">Email:</span>
          <a class="text-blue-800 dark:text-blue-400 cursor-pointer hover:underline" href="mailto:jason@jasonhorsley.tech">jason@jasonhorsley.tech</a>
        </p>
      </div>
    </div>
  </div>

</body>
</html>
